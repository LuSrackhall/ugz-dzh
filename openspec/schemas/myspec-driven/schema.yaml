name: myspec-driven
version: 1
description: >
  myspec workflow: brainstorm-spec -> proposal -> specs + design -> tasks
  -> [apply] -> verify. Entry point is myspec-br producing brainstorm-spec.md,
  then opsx:propose generates remaining artifacts. No Superpowers dependency.

artifacts:
  - id: brainstorm-spec
    generates: brainstorm-spec.md
    description: >
      Approved design document produced by myspec-br (Socratic dialogue:
      one-at-a-time questions, 2-3 approaches, section-by-section approval,
      self-review, user review gate). Single source of truth for the design phase.
    template: brainstorm-spec.md
    instruction: |
      In the standard myspec workflow, this artifact is produced by the
      myspec-br skill BEFORE opsx:propose runs. myspec-br conducts Socratic
      dialogue, writes brainstorm-spec.md to this change directory, and
      commits it. When propose reaches this artifact, the file already
      exists and is marked complete.

      If brainstorm-spec.md does NOT exist when propose reaches this
      artifact (i.e., myspec-br was not run), generate it by exploring
      the project context, asking clarifying questions, proposing
      approaches, and writing the approved design. Warn the user:
      "brainstorm-spec.md was not produced by myspec-br. Quality may be
      lower than the full Socratic dialogue process."

      brainstorm-spec.md MUST include these sections:
      - **Context**: Background, current state, constraints
      - **Goals / Non-Goals**: What this achieves and explicitly excludes
      - **Decisions**: Key choices with rationale, alternatives considered
      - **Risks / Trade-offs**: Known limitations, format: [Risk] -> Mitigation
    requires: []

  - id: proposal
    generates: proposal.md
    description: >
      Extracts Why/What/Capabilities/Impact from brainstorm-spec.md.
      Concise summary, not a new exploration.
    template: proposal.md
    instruction: |
      Create the proposal document by extracting from brainstorm-spec.md.

      Read brainstorm-spec.md for the approved design. Since brainstorm-spec
      is already a structured, user-approved design document, this is an
      extraction, not a new exploration.

      Extract:
      - **Why**: The motivation from brainstorm-spec's Context/Goals sections.
        What problem does this solve? Why now? (1-2 sentences)
      - **What Changes**: Specific changes agreed upon in brainstorm-spec's
        Decisions section. Be specific about new capabilities, modifications,
        or removals. Mark breaking changes with **BREAKING**.
      - **Capabilities**: Identify which specs will be created or modified:
        - **New Capabilities**: List capabilities being introduced. Each
          becomes a new `specs/<name>/spec.md`. Use kebab-case names.
        - **Modified Capabilities**: List existing capabilities whose
          REQUIREMENTS are changing. Check `openspec/specs/` for existing
          spec names. Leave empty if no requirement changes.
      - **Impact**: Affected code, APIs, dependencies, or systems.
        (From brainstorm-spec's Risks/Trade-offs and Context sections.)

      IMPORTANT: The Capabilities section is critical. It creates the
      contract between proposal and specs phases. Research existing specs
      before filling this in. Each capability listed here will need a
      corresponding spec file.

      Keep it concise (1-2 pages). Focus on the "why" not the "how".
    requires:
      - brainstorm-spec

  - id: specs
    generates: "specs/**/*.md"
    description: Detailed specifications for the change
    template: spec.md
    instruction: |
      Create specification files that define WHAT the system should do.

      Create one spec file per capability listed in the proposal's
      Capabilities section.
      - New capabilities: use the exact kebab-case name from the proposal
        (specs/<capability>/spec.md).
      - Modified capabilities: use the existing spec folder name from
        openspec/specs/<capability>/ when creating the delta spec at
        specs/<capability>/spec.md.

      Delta operations (use ## headers):
      - **ADDED Requirements**: New capabilities
      - **MODIFIED Requirements**: Changed behavior - MUST include full
        updated content
      - **REMOVED Requirements**: Deprecated features - MUST include
        **Reason** and **Migration**
      - **RENAMED Requirements**: Name changes only - use FROM:/TO: format

      Format requirements:
      - Each requirement: `### Requirement: <name>` followed by description
      - Use SHALL/MUST for normative requirements (avoid should/may)
      - Each scenario: `#### Scenario: <name>` with WHEN/THEN format
      - **CRITICAL**: Scenarios MUST use exactly 4 hashtags (`####`).
        Using 3 hashtags or bullets will fail silently.
      - Every requirement MUST have at least one scenario.

      MODIFIED requirements workflow:
      1. Locate the existing requirement in openspec/specs/<capability>/spec.md
      2. Copy the ENTIRE requirement block (from `### Requirement:` through
         all scenarios)
      3. Paste under `## MODIFIED Requirements` and edit to reflect new behavior
      4. Ensure header text matches exactly (whitespace-insensitive)

      Common pitfall: Using MODIFIED with partial content loses detail at
      archive time. If adding new concerns without changing existing behavior,
      use ADDED instead.

      Specs should be testable - each scenario is a potential test case.
    requires:
      - proposal

  - id: design
    generates: design.md
    description: Technical design document with implementation details
    template: design.md
    instruction: |
      Create the design document that explains HOW to implement the change.

      brainstorm-spec.md already covers the high-level design (Context,
      Goals, Decisions, Risks). design.md goes deeper on implementation:
      architecture, data flow, module boundaries, error handling, testing
      strategy.

      When to include design.md (create only if any apply):
      - Cross-cutting change (multiple services/modules) or new
        architectural pattern
      - New external dependency or significant data model changes
      - Security, performance, or migration complexity
      - Ambiguity that benefits from technical decisions before coding

      If brainstorm-spec.md already covers the implementation detail
      sufficiently, you may write a brief design.md that references it
      rather than repeating content.

      Sections:
      - **Context**: Background, current state, constraints, stakeholders
      - **Goals / Non-Goals**: What this design achieves and explicitly excludes
      - **Decisions**: Key technical choices with rationale (why X over Y?).
        Include alternatives considered for each decision.
      - **Risks / Trade-offs**: Known limitations, things that could go wrong.
        Format: [Risk] -> Mitigation
      - **Migration Plan**: Steps to deploy, rollback strategy (if applicable)
      - **Open Questions**: Outstanding decisions or unknowns to resolve

      Focus on architecture and approach, not line-by-line implementation.
      Reference the proposal for motivation and specs for requirements.
      Reference brainstorm-spec.md for the approved high-level design.

      Good design docs explain the "why" behind technical decisions.
    requires:
      - proposal

  - id: tasks
    generates: tasks.md
    description: Implementation checklist with trackable tasks
    template: tasks.md
    instruction: |
      Create the task list that breaks down the implementation work.

      **IMPORTANT: Follow the template below exactly.** The apply phase
      parses checkbox format to track progress. Tasks not using `- [ ]`
      won't be tracked.

      Guidelines:
      - Group related tasks under ## numbered headings
      - Each task MUST be a checkbox: `- [ ] X.Y Task description`
      - Tasks should be small enough to complete in one session
      - Order tasks by dependency (what must be done first?)

      Reference specs for what needs to be built.
      Reference brainstorm-spec.md and design.md for how to build it.
      Each task should be verifiable - you know when it's done.
    requires:
      - specs
      - design

  - id: verify
    generates: verify.md
    description: Post-implementation verification against specs, design, and tasks
    template: verify.md
    instruction: |
      Run verification checks after the apply phase completes.

      PRECHECK - implementation evidence:
      Before producing verify.md, confirm BOTH:
      1. Commit evidence exists:
         git log --oneline $(git merge-base HEAD origin/main 2>/dev/null || git merge-base HEAD origin/master 2>/dev/null)..HEAD | wc -l
         (must return > 0)
      2. Task progress exists:
         grep -c '^- \[x\]' openspec/changes/<change-name>/tasks.md
         (must return > 0)

      Only after BOTH return positive numbers, proceed with verification.

      Perform these checks and record results in verify.md:

      1. **Structural validation**: Run `openspec validate --all --json`
         in the repository root. Confirm every item returns
         `"valid": true`. If any item fails, record the issues.

      2. **Task completion**: Confirm every checkbox in tasks.md is
         `- [x]`. For any `- [ ]` remaining, document the reason
         (e.g., manual / out-of-scope / blocked) and whether it
         blocks archive.

      3. **Delta spec sync state**: For each directory under
         `openspec/changes/<name>/specs/`, compare against the
         corresponding `openspec/specs/<capability>/spec.md` and
         record: synced / needs sync / N/A.

      4. **Design/specs coherence**: Spot-check that design.md and
         brainstorm-spec.md decisions align with requirements in
         specs/. Record any drift as a warning (non-blocking).

      5. **Implementation signal**: Confirm all code changes are
         committed (no unstaged files). Cite the commit range.

      Verify MAY be re-run multiple times as the implementation is
      refined - each run overwrites verify.md with current state.
    requires:
      - tasks

apply:
  requires:
    - tasks
  tracks: tasks.md
  instruction: |
    Read context files (brainstorm-spec.md, design.md, specs/), work
    through pending tasks in tasks.md, mark each complete (`- [x]`) AS
    YOU FINISH IT — do NOT defer checkbox marking to the end.

    Pause if you hit blockers or need clarification.

    After all tasks are done, invoke the Skill tool with skill name
    "myspec-verify" to verify implementation and get user acceptance.

    Do NOT use /opsx:verify as a substitute — use myspec-verify.
